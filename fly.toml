# fly.toml app configuration file generated for printflow--tlhtg on 2026-05-15T01:22:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'printflow--tlhtg'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_API_URL = '/api'

[[mounts]]
  source = 'printflow_data'
  destination = '/backend/data'

[http_service]
  internal_port = 80
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
